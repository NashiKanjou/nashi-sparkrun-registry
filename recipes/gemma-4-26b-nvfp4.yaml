# Recipe: Gemma4 
recipe_version: "2"
name: Gemma 4-26B
metadata:
  description: Google Gemma 4 26B serve with vllm
  
runtime: vllm
container: vllm-node-tf5

model: RedHatAI/gemma-4-26B-A4B-it-NVFP4

cluster_only: false
solo_only: false

mods:
  - mods/gemma4

env:
  VLLM_ALLOW_LONG_MAX_MODEL_LEN: 1
  VLLM_NVFP4_GEMM_BACKEND: marlin
  
defaults:
  port: 8000
  host: 0.0.0.0
  gpu_memory_utilization: 0.62
  max_model_len: 256000
  max_num_seqs: 4

command: |
  vllm serve {model} \
  --kv-cache-dtype fp8 \
  --trust-remote-code \
  --dtype auto \
  --moe-backend marlin \
  --quantization modelopt \
  --gpu-memory-utilization {gpu_memory_utilization} \
  --max-model-len {max_model_len} \
  --max-num-seqs {max_num_seqs} \
  --host {host} \
  --port {port}
