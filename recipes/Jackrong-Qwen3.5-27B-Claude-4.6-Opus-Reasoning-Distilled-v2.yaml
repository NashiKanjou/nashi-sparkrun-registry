model: Jackrong/Qwen3.5-27B-Claude-4.6-Opus-Reasoning-Distilled-v2
runtime: vllm
container: vllm-tf5

metadata:
  description: Jackrong/Qwen3.5-27B-Claude-4.6-Opus-Reasoning-Distilled-v2

# build_args and mods here are also hints that we're using eugr's repo for builds
build_args:
  - "--tf5"
mods:
  - mods/fix-qwen3.5-chat-template

defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 1
  gpu_memory_utilization: 0.45
  reasoning_parser: qwen3
  tool_call_parser: qwen3_coder

command: |
  vllm serve \
      {model} \
      --gpu-memory-utilization {gpu_memory_utilization} \
      -tp {tensor_parallel} \
      --host {host} \
      --port {port} \
      --reasoning-parser {reasoning_parser} \
      --tool-call-parser {tool_call_parser} \
      --language-model-only \
      --chat-template unsloth.jinja \
      --enable-auto-tool-choice \
      --enable-prefix-caching \
      --trust-remote-code
