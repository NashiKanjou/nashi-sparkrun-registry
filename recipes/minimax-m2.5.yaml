recipe_version: "1"
name: MiniMax-M2.5
description: sqlang serving MiniMax-M2.5  (not finished yet..)

# Can only be run in a cluster
cluster_only: false
solo_only: false

# No mods required
mods: []


model: minimax-m2.5-ud-q3.gguf
container: scitrera/dgx-spark-sglang:0.5.10rc0
defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 1
  gpu_memory_utilization: 0.8
  max_model_len: 128000
  served_model_name: qwen3-coder-next
  attention_backend: triton
  tool_call_parser: qwen3_coder
  fp8_gemm_backend: cutlass
  
env: {}
command: |
  python3 -m sglang.launch_server \
      --model-path {model} \
      --served-model-name {served_model_name} \
      --context-length {max_model_len} \
      --mem-fraction-static {gpu_memory_utilization} \
      --tp-size {tensor_parallel} \
      --host {host} \
      --port {port} \
      --attention-backend {attention_backend} \
      --fp8-gemm-backend {fp8_gemm_backend} \
      --tool-call-parser {tool_call_parser}
runtime: sglang
min_nodes: 1
metadata:
  description: Qwen3 Coder Next (upstream FP8 quant) -- cluster only
  maintainer: scitrera.ai <open-source-team@scitrera.com>
  model_params: 80B
  model_dtype: fp8
